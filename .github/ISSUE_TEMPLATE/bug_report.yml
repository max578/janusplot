name: Bug report
description: Report unexpected behaviour in janusplot.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Before filing, please check the
        [open issues](https://github.com/max578/janusplot/issues) for a
        duplicate.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reprex
    attributes:
      label: Minimal reproducible example
      description: |
        A `reprex::reprex()` output, or a self-contained R script that triggers
        the bug. If you can, start with `library(janusplot); set.seed(2026)`.
      render: r
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: session
    attributes:
      label: sessionInfo()
      description: Paste the output of `sessionInfo()`.
      render: text
    validations:
      required: true
