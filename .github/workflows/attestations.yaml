# Signed build provenance for release tarballs.
# Triggered on a published GitHub release; produces an attestation that
# consumers can verify via `gh attestation verify`.

name: attestations.yaml

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  attestations: write
  contents: read

jobs:
  attest:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools
          needs: build

      - name: Build tarball
        run: |
          devtools::build(path = ".", vignettes = FALSE)
        shell: Rscript {0}

      - name: Generate artefact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: '*.tar.gz'
